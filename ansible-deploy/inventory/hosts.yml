---
# Fill in the public IPs after running:  ansible-playbook playbooks/provision.yml
# The provision playbook prints them at the end.

all:
  children:
    api_servers:
      hosts:
        api:
          ansible_host: FILL_IN_AFTER_PROVISION   # e.g. 54.123.45.67
          ansible_user: ubuntu

    ui_servers:
      hosts:
        ui:
          ansible_host: FILL_IN_AFTER_PROVISION   # e.g. 52.90.12.34
          ansible_user: ubuntu
